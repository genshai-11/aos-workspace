name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Build all projects
        run: |
          for dir in projects/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Building $dir for deploy..."
              cd "$dir"
              npm ci --if-present
              npm run build --if-present
              cd ../..
            fi
          done
      - name: Deploy notification
        run: echo "Deploy step - configure per project (Vercel, Cloud Run, etc.)"
